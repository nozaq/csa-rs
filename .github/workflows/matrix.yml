on:
  push:
    branches:
      - main
  pull_request:

name: build

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        rust:
          - stable
          - nightly
        os:
          - ubuntu-latest
          - macOS-latest
          - windows-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Rust
        run: |
          rustup update ${{ matrix.rust }}
          rustup default ${{ matrix.rust }}

      - run: cargo build

      - run: cargo test
